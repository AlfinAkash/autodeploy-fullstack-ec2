name: CI/CD Fullstack Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout code
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Set app versions
      - name: Set app versions
        run: |
          echo "FRONTEND_VERSION=$(cat app-version/frontend.txt)" >> $GITHUB_ENV
          echo "BACKEND_VERSION=$(cat app-version/backend.txt)" >> $GITHUB_ENV

      # 3️⃣ Docker login
      - name: Docker login
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      # 4️⃣ Build & Push Frontend
      - name: Build & Push Frontend
        run: |
          docker build -t alfinakash/fullstack-frontend:${FRONTEND_VERSION} ./frontend
          docker push alfinakash/fullstack-frontend:${FRONTEND_VERSION}
          docker tag alfinakash/fullstack-frontend:${FRONTEND_VERSION} alfinakash/fullstack-frontend:latest
          docker push alfinakash/fullstack-frontend:latest

      # 5️⃣ Build & Push Backend
      - name: Build & Push Backend
        run: |
          docker build -t alfinakash/fullstack-backend:${BACKEND_VERSION} ./backend
          docker push alfinakash/fullstack-backend:${BACKEND_VERSION}
          docker tag alfinakash/fullstack-backend:${BACKEND_VERSION} alfinakash/fullstack-backend:latest
          docker push alfinakash/fullstack-backend:latest

      # 6️⃣ Deploy to EC2
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            echo "🚀 Starting deployment on EC2..."

            # --- Install Docker if missing ---
            if ! command -v docker &> /dev/null; then
              sudo apt update
              sudo apt install -y docker.io docker-compose-plugin
              sudo systemctl start docker
              sudo systemctl enable docker
            fi

            # --- Install Git if missing ---
            if ! command -v git &> /dev/null; then
              sudo apt install -y git
            fi

            # --- Clone repo if not exists ---
            if [ ! -d "/home/ubuntu/project" ]; then
              git clone https://github.com/AlfinAkash/autodeploy-fullstack-ec2.git /home/ubuntu/project
            fi

            cd /home/ubuntu/project
            git reset --hard
            git clean -fd
            git pull

            # --- Stop & remove all existing containers ---
            echo "🛑 Stopping and removing old containers..."
            sudo docker compose down -v --remove-orphans

            # --- Pull latest images ---
            echo "📦 Pulling latest Docker images..."
            sudo docker compose pull

            # --- Start containers fresh ---
            echo "🔄 Starting containers..."
            sudo docker compose up -d

            # --- Show status and logs ---
            echo "📊 Running containers:"
            sudo docker ps

            echo "📜 Last logs:"
            sudo docker compose logs --tail=20

            echo "✅ Deployment completed successfully!"