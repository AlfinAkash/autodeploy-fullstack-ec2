name: CI/CD Fullstack Deploy (Versioned)

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Checkout
      - name: Checkout repository
        uses: actions/checkout@v3

      # Read versions
      - name: Set app versions
        run: |
          echo "FRONTEND_VERSION=$(cat app-version/frontend.txt)" >> $GITHUB_ENV
          echo "BACKEND_VERSION=$(cat app-version/backend.txt)" >> $GITHUB_ENV

      # Docker login
      - name: Docker login
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      # Build & Push Frontend
      - name: Build & Push Frontend
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/fullstack-frontend:${FRONTEND_VERSION} ./frontend
          docker push ${{ secrets.DOCKER_USERNAME }}/fullstack-frontend:${FRONTEND_VERSION}

      # Build & Push Backend
      - name: Build & Push Backend
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/fullstack-backend:${BACKEND_VERSION} ./backend
          docker push ${{ secrets.DOCKER_USERNAME }}/fullstack-backend:${BACKEND_VERSION}

      # Deploy to EC2
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: FRONTEND_VERSION,BACKEND_VERSION,DOCKER_USERNAME,DB_HOST,DB_USER,DB_PASSWORD,DB_NAME,JWT_SECRET,EC2_HOST
          script: |
            set -e
            echo "Deploying versioned containers..."

            # Install Docker if not installed
            if ! command -v docker &> /dev/null
            then
              echo "Installing Docker..."
              sudo apt update
              sudo apt install -y docker.io
              sudo systemctl start docker
              sudo systemctl enable docker
            fi

            # Create network
            sudo docker network create fullstack-net || true

            echo "Pull images"
            sudo docker pull $DOCKER_USERNAME/fullstack-backend:$BACKEND_VERSION
            sudo docker pull $DOCKER_USERNAME/fullstack-frontend:$FRONTEND_VERSION

            echo "Remove old containers"
            sudo docker stop backend || true
            sudo docker rm backend || true
            sudo docker stop frontend || true
            sudo docker rm frontend || true

            echo "Start Backend"
            sudo docker run -d \
              --name backend \
              --network fullstack-net \
              -e DB_HOST=$DB_HOST \
              -e DB_USER=$DB_USER \
              -e DB_PASSWORD=$DB_PASSWORD \
              -e DB_NAME=$DB_NAME \
              -e DB_PORT=5432 \
              -e PORT=5000 \
              -e JWT_SECRET=$JWT_SECRET \
              -p 5000:5000 \
              $DOCKER_USERNAME/fullstack-backend:$BACKEND_VERSION

            echo "Start Frontend"
            sudo docker run -d \
              --name frontend \
              --network fullstack-net \
              -e VITE_BACKEND_URL=http://$EC2_HOST:5000 \
              -p 3000:3000 \
              $DOCKER_USERNAME/fullstack-frontend:$FRONTEND_VERSION

            sudo docker ps
            echo "Deployment completed"