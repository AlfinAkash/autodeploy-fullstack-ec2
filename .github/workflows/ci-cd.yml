name: CI/CD Fullstack Deploy (Versioned)

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Checkout
      - name: Checkout repository
        uses: actions/checkout@v3

      # Read versions
      - name: Set app versions
        run: |
          echo "FRONTEND_VERSION=$(cat app-version/frontend.txt)" >> $GITHUB_ENV
          echo "BACKEND_VERSION=$(cat app-version/backend.txt)" >> $GITHUB_ENV

      # Docker login
      - name: Docker login
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      # Build & Push Frontend
      - name: Build & Push Frontend
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/fullstack-frontend:${FRONTEND_VERSION} ./frontend
          docker push ${{ secrets.DOCKER_USERNAME }}/fullstack-frontend:${FRONTEND_VERSION}

      # Build & Push Backend
      - name: Build & Push Backend
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/fullstack-backend:${BACKEND_VERSION} ./backend
          docker push ${{ secrets.DOCKER_USERNAME }}/fullstack-backend:${BACKEND_VERSION}

      # Deploy to EC2
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            echo "Deploying versioned containers..."

            # Create network
            docker network create fullstack-net || true

            echo "Pull images"
            docker pull ${{ secrets.DOCKER_USERNAME }}/fullstack-backend:${BACKEND_VERSION}
            docker pull ${{ secrets.DOCKER_USERNAME }}/fullstack-frontend:${FRONTEND_VERSION}

            echo "Remove old containers"
            docker stop backend || true
            docker rm backend || true
            docker stop frontend || true
            docker rm frontend || true

            echo "Start Backend"
            docker run -d \
              --name backend \
              --network fullstack-net \
              -e DB_HOST=mydb \
              -e DB_USER=${{ secrets.DB_USER }} \
              -e DB_PASSWORD=${{ secrets.DB_PASSWORD }} \
              -e DB_NAME=${{ secrets.DB_NAME }} \
              -e DB_PORT=5432 \
              -e PORT=5000 \
              -e JWT_SECRET=${{ secrets.JWT_SECRET }} \
              -p 5000:5000 \
              ${{ secrets.DOCKER_USERNAME }}/fullstack-backend:${BACKEND_VERSION}

            echo "Start Frontend"
            docker run -d \
              --name frontend \
              --network fullstack-net \
              -e VITE_BACKEND_URL=http://${{ secrets.EC2_HOST }}:5000 \
              -p 3000:3000 \
              ${{ secrets.DOCKER_USERNAME }}/fullstack-frontend:${FRONTEND_VERSION}

            docker ps
            echo "Deployment completed"