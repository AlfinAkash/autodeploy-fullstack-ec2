name: CI/CD Fullstack Deploy (Versioned)

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set app versions
        run: |
          echo "FRONTEND_VERSION=$(cat app-version/frontend.txt)" >> $GITHUB_ENV
          echo "BACKEND_VERSION=$(cat app-version/backend.txt)" >> $GITHUB_ENV

      - name: Docker login
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build & Push Frontend
        run: |
          docker build \
            --build-arg VITE_BACKEND_URL=${{ secrets.VITE_BACKEND_URL }} \
            -t ${{ secrets.DOCKER_USERNAME }}/fullstack-frontend:${FRONTEND_VERSION} ./frontend
          docker push ${{ secrets.DOCKER_USERNAME }}/fullstack-frontend:${FRONTEND_VERSION}

      - name: Build & Push Backend
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/fullstack-backend:${BACKEND_VERSION} ./backend
          docker push ${{ secrets.DOCKER_USERNAME }}/fullstack-backend:${BACKEND_VERSION}

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.7
        env:
          FRONTEND_VERSION: ${{ env.FRONTEND_VERSION }}
          BACKEND_VERSION: ${{ env.BACKEND_VERSION }}
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          EC2_HOST: ${{ secrets.EC2_HOST }}

        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: FRONTEND_VERSION,BACKEND_VERSION,DOCKER_USERNAME,DB_HOST,DB_USER,DB_PASSWORD,DB_NAME,JWT_SECRET,EC2_HOST
          script: |
            set -e
            echo "Deploying versioned containers..."

            if ! command -v docker &> /dev/null
            then
              echo "Installing Docker..."
              sudo apt update
              sudo apt install -y docker.io
              sudo systemctl start docker
              sudo systemctl enable docker
            fi

            sudo docker network create fullstack-net || true

            echo "Pull images"
            sudo docker pull $DOCKER_USERNAME/fullstack-backend:$BACKEND_VERSION
            sudo docker pull $DOCKER_USERNAME/fullstack-frontend:$FRONTEND_VERSION

            echo "Remove old containers"
            sudo docker stop backend || true
            sudo docker rm backend || true
            sudo docker stop frontend || true
            sudo docker rm frontend || true
            sudo docker stop mydb || true
            sudo docker rm mydb || true

            echo "Create DB volume (IMPORTANT)"
            sudo docker volume create pgdata || true

            echo "Start Database"
            sudo docker run -d \
              --name mydb \
              --network fullstack-net \
              --restart always \
              -e POSTGRES_USER=$DB_USER \
              -e POSTGRES_PASSWORD=$DB_PASSWORD \
              -e POSTGRES_DB=$DB_NAME \
              -v pgdata:/var/lib/postgresql/data \
              postgres:15

            echo "Waiting for DB..."
            sleep 10

            echo "Start Backend"
            sudo docker run -d \
              --name backend \
              --network fullstack-net \
              --restart always \
              -e DB_HOST=mydb \
              -e DB_USER=$DB_USER \
              -e DB_PASSWORD=$DB_PASSWORD \
              -e DB_NAME=$DB_NAME \
              -e DB_PORT=5432 \
              -e PORT=5000 \
              -e JWT_SECRET=$JWT_SECRET \
              -p 5000:5000 \
              $DOCKER_USERNAME/fullstack-backend:$BACKEND_VERSION

            echo "Start Frontend"
            sudo docker run -d \
              --name frontend \
              --network fullstack-net \
              --restart always \
              -p 3000:3000 \
              $DOCKER_USERNAME/fullstack-frontend:$FRONTEND_VERSION

            sudo docker ps
            echo "Deployment completed"